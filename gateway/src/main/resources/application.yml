server:
  port: 8080

spring:
  application:
    name: gateway

  web:
    resources:
      static-locations: classpath:/static/

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVICE_URL:http://localhost:8093}/.well-known/jwks.json

  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: false

services:
  auth-url: ${AUTH_SERVICE_URL:http://localhost:8093}
  user-url: ${USER_SERVICE_URL:http://localhost:8091}
  wallet-url: ${WALLET_SERVICE_URL:http://localhost:8090}
  payment-url: ${PAYMENT_SERVICE_URL:http://localhost:8092}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: gateway
