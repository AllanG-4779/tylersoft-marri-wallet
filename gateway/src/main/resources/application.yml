server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:
        - id: wallet-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/v2/accounts/**

        - id: wallet-user-management
          uri: http://localhost:8091
          predicates:
            - Path=/api/v2/users/**

        - id: payment-service
          uri: http://localhost:8092
          predicates:
            - Path=/api/v2/payments/**

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: gateway
