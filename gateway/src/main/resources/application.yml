server:
  port: 8080

spring:
  application:
    name: gateway

  web:
    resources:
      static-locations: classpath:/static/

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVICE_URL:http://localhost:8093}/.well-known/jwks.json


  cloud:
    consul:
      discovery:
        hostname: ${CONSUL_HOST:localhost}
        port: 8500
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: false



management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: gateway
