<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>3DS Authentication</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            font-family: sans-serif;
        }

        .wrapper {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            width: 420px;
        }

        .header {
            padding: 14px 18px;
            border-bottom: 1px solid #eee;
            font-size: 13px;
            color: #555;
        }

        .header strong { color: #111; }

        #loading {
            padding: 40px;
            text-align: center;
            color: #888;
            font-size: 13px;
        }

        .spinner {
            width: 28px;
            height: 28px;
            border: 2px solid #eee;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        iframe#step-up-iframe {
            display: none;
            width: 100%;
            height: 420px;
            border: none;
        }
    </style>
</head>
