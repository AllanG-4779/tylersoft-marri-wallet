name: Build & Push

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}  # images will be named <username>/<service>

jobs:
  # ─────────────────────────────────────────────
  # 1. Build the entire Maven project once.
  #    The compiled JARs are uploaded as artifacts
  #    so the matrix jobs below don't rebuild.
  # ─────────────────────────────────────────────
  maven-build:
    name: Maven Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven          # caches ~/.m2 between runs

      - name: Build all modules (skip tests on CI — run tests in a separate job)
        run: mvn --batch-mode --no-transfer-progress package -DskipTests

      # Upload every module's target/ directory so the docker jobs can grab
      # the JAR without re-running Maven.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: module-jars
          # Adjust the glob if your JARs live deeper (e.g. */*/target/*.jar)
          path: |
            **/target/*.jar
            !**/target/*-sources.jar
            !**/target/*-javadoc.jar
          retention-days: 1     # short-lived; only needed within this workflow run

  # ─────────────────────────────────────────────
  # 2. Build & push one Docker image per service.
  #    Add / remove entries in the matrix to match
  #    the services defined in your docker-compose.
  # ─────────────────────────────────────────────
  docker-build-push:
    name: Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: maven-build
    # Only push on real commits to main/develop, not on PRs
    if: github.event_name != 'pull_request'

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Add one entry per microservice ──────────────────────────────
          # service     : matches the key in docker-compose.yml
          # module_path : path to the Maven module (relative to repo root)
          # image_name  : Docker Hub repo name (username/<image_name>)
          - service: gateway-service
            module_path: gateway-service
            image_name: one-cic-gateway

          - service: account-service
            module_path: account-service
            image_name: one-cic-account

          - service: notification-service
            module_path: notification-service
            image_name: one-cic-notification
          # ────────────────────────────────────────────────────────────────

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JARs from Maven build
        uses: actions/download-artifact@v4
        with:
          name: module-jars
          # Restore into the same relative paths they were uploaded from
          path: .

      # Derive two tags:
      #   latest  — always points to the most recent build on this branch
      #   <sha>   — immutable, useful for ArgoCD Image Updater rollbacks
      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
          IMAGE="${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${IMAGE}:latest,${IMAGE}:${BRANCH}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}   # use an Access Token, not your password

      # BuildKit cache speeds up repeated builds significantly
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Reads the Dockerfile path & build context straight from docker-compose
      # so you never have to duplicate that information here.
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          # Point to the module directory that owns the Dockerfile.
          # docker-compose `build.context` is typically the module root.
          context: ${{ matrix.module_path }}
          # If your Dockerfile sits somewhere else relative to the context,
          # uncomment and adjust:
          # file: ${{ matrix.module_path }}/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          # Layer cache stored in the GitHub Actions cache backend
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
          build-args: |
            APP_VERSION=${{ github.sha }}

  
