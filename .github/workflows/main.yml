name: Build & Push

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master" ]

env:
  IMAGE_PREFIX: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # 1. Build the entire Maven project once and upload JARs as an artifact.
  # ─────────────────────────────────────────────────────────────────────────────
  maven-build:
    name: Maven Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build all modules (skip tests)
        run: mvn --batch-mode --no-transfer-progress package -DskipTests

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: module-jars
          path: |
            **/target/*.jar
            !**/target/*-sources.jar
            !**/target/*-javadoc.jar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # 2. Build & push one Docker image per service.
  # ─────────────────────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker — ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: maven-build
    if: github.event_name != 'pull_request'

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            dockerfile: auth-service/Dockerfile
            image_name: auth-service

          - service: wallet-service
            dockerfile: wallet-service/Dockerfile
            image_name: wallet-service

          - service: wallet-user-management
            dockerfile: wallet-user-management/Dockerfile
            image_name: wallet-user-management

          - service: payment-service
            dockerfile: payment-service/Dockerfile
            image_name: payment-service

          - service: gateway
            dockerfile: gateway/Dockerfile
            image_name: gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download JARs from Maven build
        uses: actions/download-artifact@v4
        with:
          name: module-jars
          path: .

      - name: Compute image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
          IMAGE="${{ env.IMAGE_PREFIX }}/${{ matrix.image_name }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${IMAGE}:latest,${IMAGE}:${BRANCH}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
