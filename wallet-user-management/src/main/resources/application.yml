server:
  port: 8091

spring:
  application:
    name: wallet-user-management
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_SERVICE_URL:http://localhost:8093}/.well-known/jwks.json
  flyway:
    url: ${SPRING_FLYWAY_URL}
    user: ${SPRING_FLYWAY_USER}
    password: ${SPRING_FLYWAY_PASSWORD}
    schemas: users

    locations: classpath:db/migration
    create-schemas: true

  r2dbc:
    url: ${SPRING_R2DBC_URL}
    username: ${SPRING_R2DBC_USERNAME}
    password: ${SPRING_R2DBC_PASSWORD}
    pool:
      max-size: 10
      initial-size: 2

  codec:
    max-in-memory-size: 10MB

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}

services:
  wallet-service:
    url: ${WALLET_SERVICE_URL}

# Credentials this service uses when calling wallet-service over Basic auth
wallet-service-client:
  username: ${WALLET_SVC_CLIENT_USERNAME:wallet-svc}
  password: ${WALLET_SVC_CLIENT_PASSWORD}

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: wallet-user-management
